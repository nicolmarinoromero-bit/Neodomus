<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEODOMUS - Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body style="background-color:#080807;" class="text-white">

  <nav class="navbar navbar-expand-lg" style="background-color:#d3ac4d;">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="logo.jpg" alt="Logo Neodomus" width="80" height="80" class="rounded-circle">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-3">
          <li class="nav-item"><a class="nav-link fw-bold text-white" href="productos.html">Productos</a></li>
          <li class="nav-item"><a class="nav-link fw-bold text-white" href="tecnicos.html">Técnicos</a></li>
          <li class="nav-item d-flex align-items-center">
            <a class="nav-link fw-bold text-white" href="ayuda.html">Ayuda</a>
            <i class="bi bi-info-circle text-white ms-1"></i>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link fw-bold text-white text-decoration-underline" href="sobre.html">Sobre nosotros</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="position-relative min-vh-100 d-flex align-items-center justify-content-center text-white">
    <img src="Fondo2.png" alt="Fondo" class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover">
    
    <div class="position-relative bg-dark bg-opacity-50 rounded-4 p-5 border border-5 border-white" style="max-width: 450px; width: 100%;">
      <h2 class="fw-bold mb-4 text-center">Registrarse</h2>
      <form action="#" method="post">
        <div class="mb-3">
          <input type="text" class="form-control rounded-pill text-center" placeholder="Nombre" name="nombre" required>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control rounded-pill text-center" placeholder="Apellido" name="apellido" required>
        </div>
        <div class="mb-3">
          <select class="form-select rounded-pill text-center" name="tipo_doc" required>
            <option selected disabled>T. Doc</option>
            <option value="CC">Cédula de ciudadanía</option>
            <option value="TI">Tarjeta de identidad</option>
            <option value="CE">Cédula de extranjería</option>
          </select>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control rounded-pill text-center" placeholder="Documento" name="documento" required>
        </div>
        <div class="mb-3">
          <input type="tel" class="form-control rounded-pill text-center" placeholder="Teléfono" name="telefono" required>
        </div>
        <div class="mb-3">
          <input type="email" class="form-control rounded-pill text-center" placeholder="Correo" name="correo" required>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control rounded-pill text-center" placeholder="Dirección" name="direccion" required>
        </div>
        <div class="mb-4">
          <input type="password" class="form-control rounded-pill text-center" placeholder="Contraseña" name="password" required>
        </div>
        <button type="submit" class="btn text-white fw-bold rounded-pill w-100" style="background-color:#d3ac4d;">
          Continuar
        </button>
      </form>
    </div>
  </section>
</body>
</html>
